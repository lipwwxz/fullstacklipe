    <style>
body {

h1 {

p {

h2 {

body {
    font-family: Arial, sans-serif;
}

/*Ajusta posição dos botões principais, ajusta espaço entre eles, distnacia da borda*/

.menu-bar {
    display: flex;
    justify-content: flex-start;
    gap: 30px; 
    padding-left: 40px;
    transition: transform 0.3s ease, background-color 0.3s ease;
}
/*Controle de espaço ao redor dos botoes principais*/
.menu {
    position: relative;
    display: flex;
    margin: 10px;
    border-radius: 10px;
    border: none;
    box-shadow: 10px black;
    
}
/*esconde o submenu*/
.submenu {
    position: absolute;
    top: 100%; 
    left: 0;

    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: 0.5s ease;

    display: flex;
    flex-direction: column;
    margin-top: 5px;
    
    
}
/*controla o submenu*/
.menu:hover .submenu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.botao-principal {
    display: flex;
    gap: 10px;
    border-radius: 5px;
    padding: 6px 10px;
    background-color: rgb(75, 125, 235);
    color: white;
    border: none;
    cursor: pointer;
    transition: transform 0.3s ease, background-color 0.3s ease;
}

/*configura o submenu*/
.botao-submenu {
    display: flex;
    border-radius: 5px;
    padding: 6px 10px;
    background-color: rgb(75, 125, 235);
    color: white;
    border: none;
    margin: 3px 0;
    cursor: pointer;
    transition: 0.5s;
    font-size: 11px;
    
}

.botao-submenu:hover {
    background-color: rgb(75, 125, 235);
    color: white;
    
}
.menu:hover {
    transform: scale(1.08);
    background-color: rgb(75, 125, 235);
    color: white;
    
}


/*colocar os botões a direita da tela, controla o espaço entre eles e define a distancia do topo*/
.menu-superior {
    display: flex;
    justify-content: flex-start; 
    gap: 30px; 
    margin-top: 1px; 
    transition: transform 0.3s ease, background-color 0.3s ease;

}

.botao-submenu:hover {
    transform: scale(1.1);
}</style>
