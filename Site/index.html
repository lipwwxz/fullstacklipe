<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCEAE</title>
</head>

<body>

    <h1>Olá a todos</h1>
    <h2>Sistema de controle e atualização do estoque.</h2>
    <div class="menu-superior">
        <!-- DASHBOARD -->
        <div class="menu">
            <button class="botao-principal">📊 Dashboard</button>

            <div class="submenu">
                <button class="botao-submenu">📦 Total de Produtos</button>
                <button class="botao-submenu">📉 Produtos com Estoque Baixo</button>
                <button class="botao-submenu">📥 Entradas do Mês</button>
                <button class="botao-submenu">📤 Saídas do Mês</button>
                <button class="botao-submenu">💰 Valor Total em Estoque</button>
            </div>
        </div>

        <!-- PRODUTOS -->
        <div class="menu">
            <button class="botao-principal">📦 Produtos</button>

            <div class="submenu">
                <button class="botao-submenu">➕ Adicionar Produto</button>
                <button class="botao-submenu">✏ Editar Produto</button>
                <button class="botao-submenu">🗑 Remover Produto</button>
                <button class="botao-submenu">🔍 Buscar Produto</button>
                <button class="botao-submenu">📋 Listar Produtos</button>
                <button class="botao-submenu">🏷 Categorias</button>
            </div>
        </div>
        <!--ENTRADAS-->
        <div class="menu">
            <button class="botao-principal">📥 Entradas</button>

            <div class="submenu">
                <button class="botao-submenu">➕ Nova Entrada</button>
                <button class="botao-submenu">📄 Histórico de Entradas</button>
                <button class="botao-submenu">👤 Registrar Fornecedor</button>
                <button class="botao-submenu">📅 Entrada por Data</button>
            </div>
        </div>
        <!--SAÍDAS-->
        <div class="menu">
            <button class="botao-principal">📤 Saídas</button>

            <div class="submenu">
                <button class="botao-submenu">➖ Registrar Saída</button>
                <button class="botao-submenu">📄 Histórico de Saídas</button>
                <button class="botao-submenu">🧾 Nota Fiscal</button>
                <button class="botao-submenu">📉 Produtos com Baixo Estoque</button>
            </div>
        </div>
        <!--RELÁTORIOS-->
        <div class="menu">
            <button class="botao-principal">📊 Relatórios</button>

            <div class="submenu">
                <button class="botao-submenu">📈 Relatório Mensal</button>
                <button class="botao-submenu">📊 Relatório Anual</button>
                <button class="botao-submenu">⚠ Produtos em Falta</button>
                
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>

</body>
</html>
